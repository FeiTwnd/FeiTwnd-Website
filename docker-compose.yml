version: '3.8'

services:
  # MySQL数据库
  mysql:
    image: mysql:8.0
    container_name: feitwnd-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-your_root_password}
      MYSQL_DATABASE: FeiTwnd
      MYSQL_USER: feitwnd
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-your_password}
      TZ: Asia/Shanghai
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d  # 初始化SQL脚本
    ports:
      - "3306:3306"
    networks:
      - feitwnd-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password

  # Redis缓存
  redis:
    image: redis:7-alpine
    container_name: feitwnd-redis
    restart: always
    ports:
      - "6379:6379"
    networks:
      - feitwnd-network
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 后端Java应用
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: feitwnd-backend
    restart: always
    environment:
      SPRING_PROFILES_ACTIVE: prod
      TZ: Asia/Shanghai
    ports:
      - "5922:5922"
    networks:
      - feitwnd-network
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./docker/app/logs:/app/logs

  # Nginx反向代理
  nginx:
    image: nginx:alpine
    container_name: feitwnd-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    networks:
      - feitwnd-network
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./docker/nginx/sites-enabled:/etc/nginx/sites-enabled:ro
      - ./docker/html:/var/www:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  mysql_data:
  redis_data:
  nginx_logs:

networks:
  feitwnd-network:
    driver: bridge
